<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Script Factory</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #07070f; min-height: 100vh; }
    @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    textarea:focus { outline: none; }
    textarea::placeholder { color: #2a2a3a; }
    .regen:hover { border-color: #f9731640 !important; color: #f97316 !important; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const SYSTEM_PROMPT = `You are a script writer for viral YouTube Shorts. You write "What if you brought [object] to [place]?" videos.

OUTPUT FORMAT — follow this exactly, no exceptions:

HOOK: What if you brought a [object] to [place]?
DAY1: [2-3 sentences]
DAY2: [2-3 sentences]
DAY3: [2-3 sentences]
DAY4: [2-3 sentences]
DAY5: [2-3 sentences]
DAY6: [2-3 sentences]
DAY7: [2-3 sentences]

RULES:
- Output exactly the 8 lines above. Nothing before HOOK. Nothing after DAY7. No extra lines.
- Each DAY line is a single line starting with DAY1:, DAY2:, etc.
- DAY7 always ends badly for the viewer — imprisoned, condemned, executed, exiled
- There is NO Day 8. Do NOT write Day 8. The script ends at DAY7.
- Total word count across all lines: 170-190 words
- Tone: calm, flat, deadpan. Like a nature documentary. Short sentences. No drama in the narration.
- Escalation arc: curiosity → fascination → obsession → greed → power struggle → danger → you lose everything
- Somewhere between DAY3 and DAY5, a famous real historical figure OR famous landmark must appear naturally (Caesar, Socrates, Cleopatra, Colosseum, etc.)
- Historical reactions must be realistic human behavior — greed, fear, desire, violence. No gods, no prophecies.
- Never reference anything modern inside the historical world.
- Always use "you" — the viewer is the main character.`;

    const DAY_COLORS = ["#f97316","#eab308","#22c55e","#3b82f6","#a78bfa","#ec4899","#ef4444"];

    function App() {
      const [concept, setConcept] = React.useState("");
      const [apiKey, setApiKey] = React.useState(() => localStorage.getItem("sf_api_key") || "");
      const [showKey, setShowKey] = React.useState(false);
      const [hook, setHook] = React.useState("");
      const [days, setDays] = React.useState([]);
      const [loading, setLoading] = React.useState(false);
      const [error, setError] = React.useState("");
      const [copied, setCopied] = React.useState(false);

      const saveKey = (val) => {
        setApiKey(val);
        localStorage.setItem("sf_api_key", val);
      };

      const parseScript = (text) => {
        const hookMatch = text.match(/HOOK:\s*(.+)/i);
        const parsedHook = hookMatch ? hookMatch[1].trim() : "";
        const parsedDays = [];
        for (let i = 1; i <= 7; i++) {
          const match = text.match(new RegExp(`DAY${i}:\\s*(.+?)(?=DAY${i+1}:|$)`, "is"));
          if (match) parsedDays.push(match[1].trim());
        }
        return { parsedHook, parsedDays };
      };

      const generate = async () => {
        if (!concept.trim()) return;
        if (!apiKey.trim()) { setError("Add your Anthropic API key first ↑"); return; }
        setLoading(true); setHook(""); setDays([]); setError(""); setCopied(false);
        try {
          const response = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "x-api-key": apiKey.trim(),
              "anthropic-version": "2023-06-01",
              "anthropic-dangerous-direct-browser-access": "true"
            },
            body: JSON.stringify({
              model: "claude-sonnet-4-20250514",
              max_tokens: 1000,
              system: SYSTEM_PROMPT,
              messages: [{ role: "user", content: `Write the script for: "${concept}"` }]
            })
          });
          const data = await response.json();
          if (data.error) { setError(data.error.message); setLoading(false); return; }
          const raw = data.content?.[0]?.text || "";
          const { parsedHook, parsedDays } = parseScript(raw);
          if (!parsedHook || parsedDays.length === 0) { setError("Generation failed — try again."); }
          else { setHook(parsedHook); setDays(parsedDays.slice(0, 7)); }
        } catch (err) { setError("Something went wrong. Check your API key."); }
        setLoading(false);
      };

      const fullScript = hook ? [hook, ...days.map((d, i) => `Day ${i+1}: ${d}`)].join("\n\n") : "";
      const wordCount = fullScript.split(/\s+/).filter(Boolean).length;
      const readTime = Math.round(wordCount / 2.6);

      const copy = () => {
        navigator.clipboard.writeText(fullScript);
        setCopied(true);
        setTimeout(() => setCopied(false), 2000);
      };

      return (
        <div style={{ background:"#07070f", minHeight:"100vh", padding:"28px 20px", fontFamily:"'Courier New', monospace", color:"#e0e0e0" }}>

          {/* Header */}
          <div style={{ maxWidth:640, margin:"0 auto 24px", textAlign:"center" }}>
            <div style={{ fontFamily:"'Syne',sans-serif", fontSize:"clamp(24px,5vw,36px)", fontWeight:800, color:"#fff", marginBottom:6 }}>
              Script <span style={{ color:"#f97316" }}>Factory</span>
            </div>
            <p style={{ color:"#333", fontSize:10, letterSpacing:2 }}>ONE LINE IN → FULL DAY 1–7 SCRIPT OUT</p>
          </div>

          {/* API Key */}
          <div style={{ maxWidth:640, margin:"0 auto 12px" }}>
            <div style={{ background:"#0d0d1a", border:"1px solid #1a1a2e", borderRadius:10, padding:"10px 14px", display:"flex", alignItems:"center", gap:10 }}>
              <span style={{ fontSize:10, color:"#444", letterSpacing:1, whiteSpace:"nowrap" }}>API KEY</span>
              <input
                type={showKey ? "text" : "password"}
                value={apiKey}
                onChange={e => saveKey(e.target.value)}
                placeholder="sk-ant-..."
                style={{ flex:1, background:"transparent", border:"none", color:"#888", fontFamily:"'Courier New',monospace", fontSize:12 }}
              />
              <span onClick={() => setShowKey(!showKey)} style={{ fontSize:10, color:"#333", cursor:"pointer" }}>{showKey ? "HIDE" : "SHOW"}</span>
            </div>
            <p style={{ fontSize:9, color:"#222", letterSpacing:1, marginTop:4, textAlign:"center" }}>GET YOUR KEY AT console.anthropic.com — STORED LOCALLY, NEVER SHARED</p>
          </div>

          {/* Input */}
          <div style={{ maxWidth:640, margin:"0 auto 20px" }}>
            <div style={{ background:"#0d0d1a", border:`1px solid ${concept ? "#f9731640" : "#1a1a2e"}`, borderRadius:12, padding:"4px 4px 4px 16px", display:"flex", alignItems:"center", gap:8, transition:"border-color 0.2s" }}>
              <textarea
                value={concept}
                onChange={e => setConcept(e.target.value)}
                onKeyDown={e => { if (e.key==="Enter" && !e.shiftKey) { e.preventDefault(); generate(); }}}
                placeholder="fidget spinner, ancient rome"
                rows={1}
                style={{ flex:1, background:"transparent", border:"none", color:"#fff", fontSize:15, fontFamily:"'Courier New',monospace", resize:"none", padding:"12px 0" }}
              />
              <button
                onClick={generate}
                disabled={loading || !concept.trim()}
                style={{ background: loading ? "#1a1a2e" : concept.trim() ? "linear-gradient(135deg,#f97316,#ec4899)" : "#1a1a2e", border:"none", borderRadius:8, padding:"10px 18px", color: loading || !concept.trim() ? "#333" : "#fff", fontFamily:"'Courier New',monospace", fontSize:12, fontWeight:700, letterSpacing:1, cursor: loading || !concept.trim() ? "not-allowed" : "pointer", whiteSpace:"nowrap", flexShrink:0 }}
              >
                {loading
                  ? <span style={{ display:"flex", alignItems:"center", gap:6 }}>
                      <span style={{ width:10, height:10, border:"2px solid #f97316", borderTopColor:"transparent", borderRadius:"50%", display:"inline-block", animation:"spin 0.7s linear infinite" }} />
                      WRITING
                    </span>
                  : "GENERATE ↵"}
              </button>
            </div>
            <p style={{ color:"#1a1a2a", fontSize:10, letterSpacing:1, marginTop:6, textAlign:"center" }}>try: "iphone, ancient egypt" · "microwave, medieval castle" · "sunglasses, mongol empire"</p>
          </div>

          {error && <div style={{ maxWidth:640, margin:"0 auto 12px", color:"#ef4444", fontSize:12, textAlign:"center" }}>{error}</div>}
          {loading && <div style={{ maxWidth:640, margin:"40px auto", textAlign:"center", color:"#2a2a3a", fontSize:11, letterSpacing:2 }}>WRITING YOUR SCRIPT...</div>}

          {/* Output */}
          {hook && !loading && (
            <div style={{ maxWidth:640, margin:"0 auto", animation:"fadeUp 0.3s ease" }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10, padding:"0 2px" }}>
                <div style={{ display:"flex", gap:14 }}>
                  <span style={{ fontSize:10, color: wordCount>=170&&wordCount<=190 ? "#22c55e" : "#f97316", letterSpacing:1 }}>{wordCount} words</span>
                  <span style={{ fontSize:10, color: readTime>=60 ? "#22c55e" : "#f97316", letterSpacing:1 }}>~{readTime}s</span>
                  {readTime>=60 && <span style={{ fontSize:10, color:"#22c55e", letterSpacing:1 }}>✓ MONETIZABLE</span>}
                </div>
                <button onClick={copy} style={{ background: copied?"#22c55e20":"#1a1a2e", border:`1px solid ${copied?"#22c55e40":"#2a2a3e"}`, borderRadius:6, padding:"4px 12px", color: copied?"#22c55e":"#444", fontFamily:"'Courier New',monospace", fontSize:10, letterSpacing:1, cursor:"pointer" }}>
                  {copied ? "✓ COPIED" : "COPY ALL"}
                </button>
              </div>

              <div style={{ background:"#0d0d1a", border:"1px solid #f9731630", borderRadius:"10px 10px 0 0", padding:"14px 18px" }}>
                <div style={{ fontSize:9, color:"#f97316", letterSpacing:2, marginBottom:6 }}>HOOK</div>
                <div style={{ fontSize:14, color:"#fff", lineHeight:1.6, fontWeight:600 }}>{hook}</div>
              </div>

              {days.map((text, i) => {
                const num = i+1;
                const color = DAY_COLORS[i];
                const isLast = num===7;
                return (
                  <div key={i} style={{ background: isLast?`${color}12`:"#0a0a16", border:`1px solid ${isLast?color+"40":"#13131f"}`, borderTop:"none", borderRadius: num===days.length?"0 0 10px 10px":0, padding:"12px 18px" }}>
                    <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:6 }}>
                      <span style={{ fontFamily:"'Syne',sans-serif", fontSize:11, fontWeight:800, color, letterSpacing:1 }}>DAY {num}</span>
                      {isLast && <span style={{ fontSize:9, color, background:`${color}20`, padding:"2px 8px", borderRadius:10, letterSpacing:1 }}>⚡ THE TWIST</span>}
                    </div>
                    <div style={{ fontSize:13, color: isLast?"#ddd":"#888", lineHeight:1.75 }}>{text}</div>
                  </div>
                );
              })}

              <div style={{ marginTop:12, textAlign:"center" }}>
                <button className="regen" onClick={generate} style={{ background:"transparent", border:"1px solid #1a1a2e", borderRadius:8, padding:"8px 20px", color:"#333", fontFamily:"'Courier New',monospace", fontSize:10, letterSpacing:2, cursor:"pointer", transition:"all 0.2s" }}>
                  ↺ REGENERATE
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
